name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Check root/scaffold parity
        run: python scripts/check_sync.py

      - name: Check version consistency (no drift across manifests + docs)
        run: python scripts/release.py --check

      - name: Smoke-test guardrails deny via the ||-immune JSON protocol (exit 0)
        shell: bash
        run: |
          # assert_deny is called directly (NOT on the right of a pipe), so its
          # `exit 1` exits this step — the checks actually gate the build.
          assert_deny() {  # $1=hook  $2=payload  $3=desc ; must emit a JSON deny AND exit 0
            out=$(printf '%s' "$2" | python "hooks/$1"); rc=$?
            echo "$out" | grep -q '"permissionDecision": "deny"' \
              || { echo "FAIL: $1 did not deny ($3)"; exit 1; }
            [ "$rc" -eq 0 ] \
              || { echo "FAIL: $1 denied with exit $rc — a non-zero deny is swallowed by the || wrapper ($3)"; exit 1; }
          }
          assert_deny git_safety.py '{"tool_name":"Bash","tool_input":{"command":"git reset --hard"}}' "hard reset"
          assert_deny git_safety.py '{"tool_name":"Bash","tool_input":{"command":"git -C . reset --hard"}}' "-C bypass"
          assert_deny git_safety.py '{"tool_name":"PowerShell","tool_input":{"command":"git push --force origin main"}}' "PowerShell force push"
          assert_deny protect_secrets.py '{"tool_name":"Write","tool_input":{"file_path":".env"}}' ".env write"
          assert_deny protect_secrets.py '{"tool_name":"Bash","tool_input":{"command":"echo K=v > .env"}}' "bash redirect to .env"
          assert_deny protect_secrets.py '{"tool_name":"PowerShell","tool_input":{"command":"Set-Content -Path .env -Value x"}}' "PowerShell Set-Content .env"
          assert_deny protect_secrets.py '{"tool_name":"PowerShell","tool_input":{"command":"Set-Content -Verbose .env -Value x"}}' "PowerShell -Verbose Set-Content .env (fail-safe switch)"
          # headline: the deny must SURVIVE the python3 X || python X wrapper (not swallowed)
          out=$(echo '{"tool_name":"Bash","tool_input":{"command":"git reset --hard"}}' | sh -c 'python hooks/git_safety.py || python hooks/git_safety.py')
          echo "$out" | grep -q '"permissionDecision": "deny"' || { echo "FAIL: deny swallowed by the || chain"; exit 1; }
          echo "guardrails deny via JSON; PowerShell (incl. valueless switches) covered; || chain preserves the deny"

      - name: SessionStart hook never fails a session (must always exit 0)
        shell: bash
        run: |
          set +e
          echo 'not valid json' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on malformed stdin"; exit 1; }
          echo '' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on empty stdin"; exit 1; }
          echo '{"source":"startup"}' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on missing cwd"; exit 1; }
          echo "session_orient exits 0"

      - name: Stop-hook completion gate never fails a turn (must always exit 0)
        shell: bash
        run: |
          set +e
          for payload in 'not valid json' '' '{"session_id":"abc12345"}' '{"cwd":"/","session_id":"abc12345"}'; do
            echo "$payload" | python hooks/completion_gate.py >/dev/null
            [ $? -eq 0 ] || { echo "FAIL: completion_gate did not exit 0 on: $payload"; exit 1; }
          done
          echo "completion_gate exits 0"

      - name: Packet guard never breaks an edit (must always exit 0)
        shell: bash
        run: |
          set +e
          for payload in 'garbage' '' '{"tool_name":"Write","cwd":"/","session_id":"abc12345","tool_input":{"file_path":"x.py"}}'; do
            echo "$payload" | python hooks/packet_guard.py >/dev/null
            [ $? -eq 0 ] || { echo "FAIL: packet_guard did not exit 0 on: $payload"; exit 1; }
          done
          echo "packet_guard exits 0"

      - name: Brief engine always exits 0 with a valid FACTS block
        shell: bash
        run: |
          set +e
          out=$(cd /tmp && python "$GITHUB_WORKSPACE/scripts/brief.py")
          [ $? -eq 0 ] || { echo "FAIL: brief.py did not exit 0 outside a project"; exit 1; }
          echo "$out" | python -c "import json,sys; assert json.load(sys.stdin)['drydock']=='not-initialized'" \
            || { echo "FAIL: brief.py block invalid outside a project"; exit 1; }
          out=$(python scripts/brief.py)
          echo "$out" | python -c "import json,sys; assert json.load(sys.stdin)['drydock']=='ok'" \
            || { echo "FAIL: brief.py block invalid on this repo"; exit 1; }
          echo "brief engine ok"
