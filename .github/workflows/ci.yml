name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Check root/scaffold parity
        run: python scripts/check_sync.py

      - name: Check version consistency (no drift across manifests + docs)
        run: python scripts/release.py --check

      - name: Smoke-test guardrails are live (must block with exit 2)
        shell: bash
        run: |
          set +e
          echo '{"tool_name":"Bash","tool_input":{"command":"git reset --hard"}}' | python hooks/git_safety.py
          [ $? -eq 2 ] || { echo "FAIL: git_safety did not block a hard reset"; exit 1; }
          echo '{"tool_name":"Bash","tool_input":{"command":"git -C . reset --hard"}}' | python hooks/git_safety.py
          [ $? -eq 2 ] || { echo "FAIL: git_safety did not block the -C bypass"; exit 1; }
          echo '{"tool_name":"Write","tool_input":{"file_path":".env"}}' | python hooks/protect_secrets.py
          [ $? -eq 2 ] || { echo "FAIL: protect_secrets did not block a .env write"; exit 1; }
          echo '{"tool_name":"Bash","tool_input":{"command":"echo K=v > .env"}}' | python hooks/protect_secrets.py
          [ $? -eq 2 ] || { echo "FAIL: protect_secrets did not block a Bash redirect to .env"; exit 1; }
          echo "guardrails live"

      - name: SessionStart hook never fails a session (must always exit 0)
        shell: bash
        run: |
          set +e
          echo 'not valid json' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on malformed stdin"; exit 1; }
          echo '' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on empty stdin"; exit 1; }
          echo '{"source":"startup"}' | python hooks/session_orient.py
          [ $? -eq 0 ] || { echo "FAIL: session_orient did not exit 0 on missing cwd"; exit 1; }
          echo "session_orient exits 0"

      - name: Stop-hook completion gate never fails a turn (must always exit 0)
        shell: bash
        run: |
          set +e
          for payload in 'not valid json' '' '{"session_id":"abc12345"}' '{"cwd":"/","session_id":"abc12345"}'; do
            echo "$payload" | python hooks/completion_gate.py >/dev/null
            [ $? -eq 0 ] || { echo "FAIL: completion_gate did not exit 0 on: $payload"; exit 1; }
          done
          echo "completion_gate exits 0"
